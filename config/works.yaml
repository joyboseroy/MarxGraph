# MarxGraph V1 corpus manifest
# Direct EPUB URLs verified against https://www.marxists.org/ebooks/index.htm (Sep 2024 listing).
# license: "pd" = public domain (pre-1929 original, MIA volunteer translation), "verify" = check
# the work's credits/copyright page on MIA before redistributing text on Hugging Face.
# If a work turns out to be non-redistributable, release passage OFFSETS + annotations for it
# instead of raw text (the standard workaround used by e.g. BookCorpus successors).

settings:
  user_agent: "MarxGraphBot/0.1 (academic research; contact: joy.bose@ieee.org)"
  delay_seconds: 5          # be gentle, MIA is volunteer-run
  out_dir: data/raw

# ---- Index pages to harvest additional EPUB links from ----
index_pages:
  - name: marx_engels_library
    url: https://www.marxists.org/archive/marx/works/download/index.htm
    author: mixed_marx_engels          # resolve per-file after download
    tradition: classical_marxism
    include_keywords: [manifesto, german-ideology, german_ideology, gotha, brumaire,
                       wage, value-price, value_price, capital, socialism-utopian,
                       soc-utop, anti-duhring, anti_duhring, origin, feuerbach,
                       poverty-of-philosophy, civil-war-in-france, 1844]
  - name: trotsky_library
    url: https://www.marxists.org/ebooks/trotsky/index.htm
    author: trotsky
    tradition: trotskyism
    include_keywords: [permanent, revolution-betrayed, betrayed, history, results,
                       prospects, defence-of-marxism, defense, transitional,
                       terrorism, lessons-of-october, stalinism]

